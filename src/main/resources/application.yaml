spring:
  application:
    name: card-cms

  datasource:
    url: jdbc:postgresql://localhost:5432/cms
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Malani1963}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000

  flyway:
    enabled: true
    clean-disabled: false
    locations: classpath:db/migration
    validate-on-migrate: false
    baseline-on-migrate: true

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param

logging:
  config: classpath:logback-spring.xml
  level:
    com.epic.cms: DEBUG
    com.epic.cms.config: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  file:
    path: ./logs

# Encryption Keys
# IMPORTANT: Use environment variables in production. Never commit actual keys to version control.
encryption:
  # Transport key - shared with frontend (must match VITE_ENCRYPTION_KEY)
  # This key is used to decrypt data received from frontend
  transport:
    key: ${TRANSPORT_ENCRYPTION_KEY:bPRw3dR0xfnHIn3Vr0mFS4BLjEvzDpWPW/0k2+P+72c=}
  
  # Storage key - backend only (NEVER expose to frontend)
  # This key is used to encrypt sensitive data (card numbers) in the database
  # Generate a new key for production using: openssl rand -base64 32
  storage:
    key: ${STORAGE_ENCRYPTION_KEY:Oz/u0t6uq32rDyqFSsTdX0KiD1aMv6H1RzJO0hbHNhA=}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method